<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJSR Meeting Intelligence Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e2ddd4;
  --border2: #cdc8bc;
  --text: #1a1814;
  --text2: #6b6560;
  --text3: #9c9690;
  --gold: #b8922e;
  --gold-light: #f5edda;
  --gold-mid: #e8d5a0;
  --red: #c0392b; --red-bg: #fdf0ef;
  --green: #1a7a4a; --green-bg: #edf7f2;
  --amber: #b07d1a; --amber-bg: #fdf6e3;
  --blue: #1a5fa8; --blue-bg: #edf3fc;
  --purple: #5a3e9e; --purple-bg: #f2effe;
  --teal: #0f7a6a; --teal-bg: #e8f7f5;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── SHELL ── */
.app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0; background: var(--text);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
}
.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 18px; color: #fff; letter-spacing: .01em; line-height: 1.2;
}
.brand-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 3px; letter-spacing: .08em; text-transform: uppercase; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section-label { font-size: 10px; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .1em; padding: 14px 20px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; font-size: 13px; color: rgba(255,255,255,.6);
  cursor: pointer; transition: all .15s; border: none; background: none; width: 100%; text-align: left;
  border-left: 2px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,.05); }
.nav-item.active { color: #fff; background: rgba(255,255,255,.08); border-left-color: var(--gold); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
.nav-item.active .nav-icon, .nav-item:hover .nav-icon { opacity: 1; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08); }
.storage-badge {
  font-size: 11px; color: rgba(255,255,255,.4);
  display: flex; align-items: center; gap: 6px;
}
.storage-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ── MAIN ── */
.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 16px; font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.content { padding: 28px 32px; flex: 1; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; font-size: 13px; font-family: inherit;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  cursor: pointer; background: var(--surface); color: var(--text);
  transition: all .15s; font-weight: 500; white-space: nowrap;
}
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn-primary { background: var(--text); color: #fff; border-color: transparent; }
.btn-primary:hover { opacity: .88; background: var(--text); }
.btn-gold { background: var(--gold); color: #fff; border-color: transparent; }
.btn-gold:hover { opacity: .88; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-danger { border-color: #f5b8b4; color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }
.btn-icon { padding: 7px; border-radius: var(--radius-sm); width: 32px; height: 32px; justify-content: center; }

/* ── METRICS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.metric-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; box-shadow: var(--shadow-sm);
}
.metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 8px; }
.metric-value { font-size: 32px; font-weight: 300; font-family: 'DM Serif Display', serif; line-height: 1; }
.metric-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
.mv-total { color: var(--text); }
.mv-pending { color: var(--red); }
.mv-complete { color: var(--green); }
.mv-blocked { color: var(--amber); }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 13px; font-weight: 600; }
.card-body { padding: 16px 20px; }

/* ── DEPT GRID ── */
.dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.dept-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.dept-card-label { margin-bottom: 6px; }
.dept-card-count { font-size: 24px; font-weight: 300; font-family: 'DM Serif Display', serif; margin-bottom: 2px; }
.dept-card-sub { font-size: 11px; color: var(--text3); }

/* ── PERSON GRID ── */
.person-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.person-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.person-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.av-0{background:#dbeafe;color:#1e40af;} .av-1{background:#d1fae5;color:#065f46;} .av-2{background:#fef3c7;color:#92400e;}
.av-3{background:#ffe4e6;color:#9f1239;} .av-4{background:#ede9fe;color:#4c1d95;} .av-5{background:#ccfbf1;color:#134e4a;}
.person-name { font-size: 13px; font-weight: 500; }
.mini-bars { display: flex; flex-direction: column; gap: 5px; }
.mini-bar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); }
.mini-bar-label { width: 46px; flex-shrink: 0; }
.mini-bar-track { flex: 1; background: var(--surface2); border-radius: 2px; height: 4px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 2px; }
.mini-bar-count { width: 16px; text-align: right; flex-shrink: 0; }

/* ── TASK ITEMS ── */
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 16px; transition: opacity .2s, border-color .15s;
}
.task-card:hover { border-color: var(--border2); }
.task-card.done { opacity: .5; }
.task-card.p-high { border-left: 3px solid var(--red); }
.task-card.p-medium { border-left: 3px solid var(--blue); }
.task-card.p-low { border-left: 3px solid var(--border); }
.task-row { display: flex; align-items: flex-start; gap: 10px; }
.task-cb { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; margin-top: 2px; accent-color: var(--green); }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 13px; line-height: 1.5; }
.task-text.struck { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.task-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.task-notes-box { margin-top: 8px; padding: 8px 10px; background: var(--surface2); border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); line-height: 1.5; }
.task-notes-input { width: 100%; margin-top: 8px; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; color: var(--text); resize: none; min-height: 52px; }
.task-notes-input:focus { outline: none; border-color: var(--border2); }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.b-pending { background: var(--red-bg); color: var(--red); }
.b-complete { background: var(--green-bg); color: var(--green); }
.b-blocked { background: var(--amber-bg); color: var(--amber); }
.b-wip { background: var(--blue-bg); color: var(--blue); }
.b-alias { background: var(--purple-bg); color: var(--purple); }
.b-date { background: var(--surface2); color: var(--text2); }
.b-date.overdue { background: var(--red-bg); color: var(--red); font-weight: 600; }
.b-date.due-soon { background: var(--amber-bg); color: var(--amber); font-weight: 500; }
.pill { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; font-weight: 500; }

/* dept colours */
.d-Operations{background:#e8f7f0;color:#0f6e56;border-color:#5DCAA5;}
.d-Finance{background:#fef6e4;color:#8a5c10;border-color:#d4a32a;}
.d-HR{background:#f0ecfe;color:#4a32a0;border-color:#9c86e8;}
.d-Sales{background:#edf3fc;color:#1a5fa8;border-color:#7aabdf;}
.d-Admin{background:#f5f4f0;color:#4a4840;border-color:#b4b0a8;}
.d-Technical{background:#fdf0ef;color:#9a2c20;border-color:#e8887e;}
.d-Marketing{background:#fbeaf0;color:#72243e;border-color:#ed93b1;}
.d-Management{background:#edf7f0;color:#1a6640;border-color:#5ab87a;}
.d-Other{background:#f5f4f0;color:#4a4840;border-color:#b4b0a8;}
.src-samsung{background:#edf3fc;color:#1a5fa8;border-color:#7aabdf;}
.src-teams{background:#f0ecfe;color:#4a32a0;border-color:#9c86e8;}
.src-manual{background:#f5f4f0;color:#4a4840;border-color:#b4b0a8;}

/* ── MEETING CARDS ── */
.meeting-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: box-shadow .15s; }
.meeting-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.meeting-card-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; user-select: none; }
.meeting-card-header:hover { background: var(--surface2); }
.meeting-card.open .meeting-card-header { border-bottom: 1px solid var(--border); }
.meeting-title-text { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
.meeting-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.meeting-summary { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; background: var(--surface2); padding: 10px 12px; border-radius: var(--radius-sm); }
.kp-list { margin-bottom: 12px; }
.kp-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 6px; }
.kp-item { font-size: 12px; color: var(--text2); padding: 4px 0; border-bottom: 1px solid var(--border); line-height: 1.5; }
.kp-item:last-child { border-bottom: none; }
.meeting-progress { font-size: 12px; color: var(--text3); text-align: right; flex-shrink: 0; }
.mtg-chevron { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--text3); flex-shrink: 0; transition: transform .2s; }
.meeting-card.open .mtg-chevron { transform: rotate(180deg); }
.mtg-pending-badge { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--red-bg); color: var(--red); font-weight: 500; white-space: nowrap; }
.mtg-complete-badge { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--green-bg); color: var(--green); font-weight: 500; white-space: nowrap; }
.mtg-task-summary { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.meeting-card-body { padding: 0; max-height: 0; overflow: hidden; transition: max-height .25s ease, padding .25s ease; }
.meeting-card.open .meeting-card-body { padding: 14px 18px; max-height: 9999px; }
.prog-bar-wrap { background: var(--surface2); border-radius: 2px; height: 4px; width: 80px; margin-top: 6px; overflow: hidden; }
.prog-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }

/* ── FORMS ── */
.form-section { margin-bottom: 20px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px; font-size: 13px; font-family: inherit;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--gold); }
.form-textarea { resize: vertical; min-height: 150px; line-height: 1.6; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; }
.form-col { flex: 1; min-width: 140px; }

/* ── UPLOAD ZONE ── */
.upload-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius);
  padding: 24px 20px; text-align: center; cursor: pointer;
  transition: all .15s; margin-bottom: 14px;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--gold); background: var(--gold-light); }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.upload-text strong { color: var(--text); }
.file-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold-light); border: 1px solid var(--gold-mid);
  border-radius: 999px; padding: 4px 12px; font-size: 12px; color: var(--gold); font-weight: 500;
  margin: 4px 4px 10px 0;
}
.chip-remove { cursor: pointer; background: none; border: none; color: var(--gold); font-size: 14px; line-height: 1; padding: 0 2px; }

/* ── AI STATUS ── */
.ai-status-box { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: var(--surface2); border-radius: var(--radius); margin-top: 12px; font-size: 13px; color: var(--text2); }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SELECT DROPDOWNS in tasks ── */
.mini-select { font-size: 11px; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; background: var(--surface2); color: var(--text); cursor: pointer; font-family: inherit; }
.mini-select:focus { outline: none; border-color: var(--border2); }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-pill { padding: 5px 13px; font-size: 12px; border: 1px solid var(--border); border-radius: 999px; cursor: pointer; background: var(--surface); color: var(--text2); transition: all .15s; white-space: nowrap; }
.filter-pill:hover { border-color: var(--border2); color: var(--text); }
.filter-pill.active { background: var(--text); color: #fff; border-color: transparent; }
.filter-gap { flex: 1; }
.filter-select { font-size: 12px; border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; background: var(--surface); color: var(--text2); cursor: pointer; }

/* ── CEO REPORT ── */
.ceo-layout { display: flex; flex-direction: column; gap: 20px; }
.ceo-toggle { display: flex; gap: 4px; background: var(--surface2); border-radius: 999px; padding: 4px; }
.ceo-toggle-btn { padding: 5px 14px; font-size: 12px; border: none; background: transparent; border-radius: 999px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all .15s; }
.ceo-toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.report-view { display: none; }
.report-view.active { display: block; }
.report-formal { max-width: 720px; }
.report-formal-header { text-align: center; padding-bottom: 20px; border-bottom: 2px solid var(--text); margin-bottom: 24px; }
.report-formal-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
.report-formal-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
.report-formal-date { font-size: 12px; color: var(--text2); margin-top: 8px; }
.report-section { margin-bottom: 20px; }
.report-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); font-weight: 600; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.report-stat-row { display: flex; gap: 0; margin-bottom: 14px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.report-stat { flex: 1; padding: 14px 16px; text-align: center; border-right: 1px solid var(--border); }
.report-stat:last-child { border-right: none; }
.report-stat-val { font-size: 28px; font-weight: 300; font-family: 'DM Serif Display', serif; }
.report-stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.dept-progress-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.dept-progress-item:last-child { border-bottom: none; }
.dept-bar-wrap { flex: 1; background: var(--surface2); border-radius: 2px; height: 6px; overflow: hidden; }
.dept-bar-fill { height: 100%; border-radius: 2px; background: var(--green); }

/* ── ALIAS TABLE ── */
.alias-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.alias-table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.alias-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.alias-table tr:last-child td { border-bottom: none; }
.alias-tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; font-size: 11px; padding: 2px 9px; margin: 2px 3px 2px 0; color: var(--text2); }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,.15); width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px 6px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 22px; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── INFO BANNER ── */
.info-banner { background: var(--gold-light); border: 1px solid var(--gold-mid); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--amber); line-height: 1.5; margin-bottom: 18px; display: flex; gap: 10px; }
.warn-banner { background: var(--red-bg); border: 1px solid #f5c8c4; border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--red); margin-bottom: 14px; }
.success-banner { background: var(--green-bg); border: 1px solid #b8e8cc; border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--green); margin-bottom: 14px; }

/* ── SEARCH BOX ── */
.search-wrap { position: relative; }
.search-input { padding-left: 32px !important; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

/* ── EMPTY ── */
.empty-state { padding: 3rem; text-align: center; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* ── PRINT ── */
@media print {
  .sidebar, .topbar, .no-print { display: none !important; }
  .main { margin-left: 0; }

/* ── STORAGE: Google Sheets + localStorage hybrid ── */
// Set your deployed Apps Script URL here after deployment:
let SCRIPT_URL = localStorage.getItem('mjsr_script_url') || '';
let syncStatus = 'local'; // 'local' | 'syncing' | 'synced' | 'error'
let pendingSync = false;

function setSyncStatus(s, detail) {
  syncStatus = s;
  const dot  = document.getElementById('storage-dot');
  const lbl  = document.getElementById('storage-label');
  if (!dot || !lbl) return;
  const colors = { local:'#b8922e', syncing:'#1a5fa8', synced:'#1a7a4a', error:'#c0392b' };
  const labels = {
    local:   `${db.tasks.length} tasks · ${db.meetings.length} meetings · local only`,
    syncing: 'Syncing to Google Sheets…',
    synced:  `${db.tasks.length} tasks · ${db.meetings.length} meetings · Sheets live`,
    error:   'Sync error — saved locally'
  };
  dot.style.background = colors[s];
  lbl.textContent = detail || labels[s];
}

// Write to localStorage immediately, then push to Sheets in background
function saveDB(skipRemote) {
  try { localStorage.setItem('mjsr_hub_db', JSON.stringify(db)); } catch(e){}
  setSyncStatus(SCRIPT_URL ? 'syncing' : 'local');
  if (!skipRemote && SCRIPT_URL) pushToSheets();
}

async function pushToSheets(action, payload) {
  if (!SCRIPT_URL) return;
  try {
    const body = payload || { action:'syncAll', data: db };
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });
    const result = await resp.json();
    if (result.error) throw new Error(result.error);
    setSyncStatus('synced');
    return result;
  } catch(err) {
    setSyncStatus('error', 'Sync failed — data saved locally');
    console.warn('Sheets sync error:', err.message);
  }
}

async function loadDB() {
  // 1. Load from localStorage for instant display
  try {
    const raw = localStorage.getItem('mjsr_hub_db');
    if (raw) { db = JSON.parse(raw); }
    else { seedSampleData(); saveDB(true); }
  } catch(e) { seedSampleData(); saveDB(true); }
  setSyncStatus('local');

  // 2. If script URL is set, pull fresh data from Sheets in background
  if (SCRIPT_URL) {
    setSyncStatus('syncing', 'Loading from Google Sheets…');
    try {
      const resp = await fetch(SCRIPT_URL + '?action=getAll', { method: 'GET' });
      const result = await resp.json();
      if (result.meetings && result.tasks && result.aliases) {
        db.meetings = result.meetings;
        db.tasks    = result.tasks;
        db.aliases  = result.aliases;
        localStorage.setItem('mjsr_hub_db', JSON.stringify(db));
        setSyncStatus('synced');
        renderCurrentPage();
        updateNavBadge();
      }
    } catch(err) {
      setSyncStatus('error', 'Sheets unavailable — using local data');
    }
  }
}

/* ── ALIAS ENGINE ── */
function resolveAlias(raw) {
  if (!raw) return { name:raw, resolved:false, from:null };
  const n = raw.trim().toLowerCase();
  for (const e of db.aliases) {
    if (e.canonical.toLowerCase() === n) return { name:e.canonical, resolved:false, from:null };
    for (const v of e.variants) if (v.trim().toLowerCase() === n) return { name:e.canonical, resolved:true, from:raw };
  }
  for (const e of db.aliases) {
    const cl = e.canonical.toLowerCase();
    if (n.includes(cl) || cl.includes(n)) return { name:e.canonical, resolved:false, from:null };
    for (const v of e.variants) { const vl = v.trim().toLowerCase(); if (n.includes(vl)||vl.includes(n)) return { name:e.canonical, resolved:true, from:raw }; }
  }
  return { name:raw.trim(), resolved:false, from:null };
}
function normaliseText(text) {
  let o = text;
  for (const e of db.aliases) for (const v of e.variants) {
    const re = new RegExp('\\b'+v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi');
    o = o.replace(re, e.canonical);
  }
  return o;
}

/* ── HELPERS ── */
function uid() { return 't'+Date.now()+Math.random().toString(36).slice(2,6); }
function isOverdue(t) { if(t.status==='complete'||!t.due) return false; const d=new Date(t.due);d.setHours(0,0,0,0);return d<TODAY; }
function isDueSoon(t) { if(t.status==='complete'||!t.due) return false; const d=new Date(t.due);d.setHours(0,0,0,0);const diff=(d-TODAY)/(864e5);return diff>=0&&diff<=3; }
function fmtDate(s) { if(!s) return ''; const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function getInitials(n) { return n.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2)||'?'; }
function getAVColor(n) { let h=0; for(const c of n) h=(h*31+c.charCodeAt(0))&0xffff; return AV_COLORS[h%AV_COLORS.length]; }
function pClass(p) { return p==='high'?'p-high':p==='low'?'p-low':'p-medium'; }

function deptPill(d) { if(!d)return''; return`<span class="pill ${DEPT_CLASS[d]||'d-Other'}">${d}</span>`; }
function srcPill(s) {
  if(!s)return'';
  const cl = s.includes('Samsung')?'src-samsung':s==='Manual'?'src-manual':'src-teams';
  const lbl = s.includes('Samsung')?'Samsung Notes':s==='Manual'?'Manual':'Read AI';
  return `<span class="pill ${cl}">${lbl}</span>`;
}
function statusBadge(s) {
  const m={pending:'b-pending',complete:'b-complete',blocked:'b-blocked',wip:'b-wip'};
  const l={pending:'Pending',complete:'Complete',blocked:'Blocked',wip:'In progress'};
  return `<span class="badge ${m[s]||'b-pending'}">${l[s]||s}</span>`;
}
function dueBadge(t) {
  if(!t.due) return '';
  const cls = isOverdue(t)?'overdue':isDueSoon(t)?'due-soon':'';
  const prefix = isOverdue(t)?'Overdue: ':isDueSoon(t)?'Due soon: ':'Due: ';
  return `<span class="badge b-date ${cls}">${prefix}${fmtDate(t.due)}</span>`;
}

/* ── DASHBOARD ── */
function renderDashboard() {
  const tasks=db.tasks, total=tasks.length;

  const complete=tasks.filter(t=>t.status==='complete').length;
  const blocked=tasks.filter(t=>t.status==='blocked').length;
  const wip=tasks.filter(t=>t.status==='wip').length;
  const overdue=tasks.filter(t=>isOverdue(t)).length;
  const dueSoon=tasks.filter(t=>isDueSoon(t)).length;

  document.getElementById('nav-badge-tasks').textContent = pending+wip||'';
  setTopbarActions(`<button class="btn btn-sm" onclick="refreshFromSheets()" title="Pull latest data from Google Sheets">&#8635; Refresh</button> <button class="btn btn-gold btn-sm" onclick="showPage('import',null)">+ Import meeting</button>`);

  // dept counts

  // person counts
  const pp={};
  tasks.forEach(t=>{if(!t.assignee)return;if(!pp[t.assignee])pp[t.assignee]={total:0,pending:0,complete:0,blocked:0,wip:0};pp[t.assignee].total++;pp[t.assignee][t.status]=(pp[t.assignee][t.status]||0)+1;});

  const overdueItems = tasks.filter(t=>isOverdue(t)||isDueSoon(t));

  document.getElementById('content-area').innerHTML = `
    <div class="metrics-grid">

/* ── TASK CARD HTML ── */
function taskCardHtml(t, minimal=false) {
  const mtg = db.meetings.find(m=>m.id===t.meetingId);
  const notesHtml = t.notes ? `<div class="task-notes-box">${t.notes}</div>` : '';
  const aliasBadge = t.aliasResolved ? `<span class="badge b-alias">was "${t.aliasFrom}"</span>` : '';
  const mtgPill = mtg&&!minimal ? `<span class="badge b-date" style="cursor:pointer" onclick="showPage('meetings',null)">${mtg.title}</span>` : '';
  const srcPillHtml = minimal && mtg ? srcPill(mtg.source) : '';
  const statSel = !minimal ? `<select class="mini-select" onchange="qChangeStatus('${t.id}',this.value)">${['pending','wip','complete','blocked'].map(s=>`<option value="${s}"${t.status===s?' selected':''}>${{pending:'Pending',wip:'In progress',complete:'Complete',blocked:'Blocked'}[s]}</option>`).join('')}</select>` : '';
  const deptSel = !minimal ? `<select class="mini-select" onchange="qChangeDept('${t.id}',this.value)"><option value="">Dept</option>${DEPTS.map(d=>`<option value="${d}"${t.dept===d?' selected':''}>${d}</option>`).join('')}</select>` : '';

  return `<div class="task-card ${t.status==='complete'?'done':''} ${pClass(t.priority||'medium')}" id="tc-${t.id}">
    <div class="task-row">
      <input type="checkbox" class="task-cb" ${t.status==='complete'?'checked':''} onchange="qToggle('${t.id}',this.checked)">
      <div class="task-body">
        <div class="task-text ${t.status==='complete'?'struck':''}">${t.text}</div>
        ${notesHtml}
        <div class="task-meta">
          ${statusBadge(t.status)}
          ${t.assignee?`<span class="badge b-date"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:2px;vertical-align:middle;"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/></svg>${t.assignee}</span>`:''}
          ${deptPill(t.dept)}
          ${dueBadge(t)}
          ${aliasBadge}
          ${srcPillHtml}
          ${mtgPill}
          ${statSel}
          ${deptSel}
          ${!minimal?`<button class="note-toggle" onclick="toggleNoteEdit('${t.id}')">${t.notes?'edit note':'+ note'}</button>`:''}
        </div>
        <div id="note-edit-${t.id}" style="display:none;">
          <textarea class="task-notes-input" id="note-input-${t.id}" placeholder="Add notes, blockers, context...">${t.notes||''}</textarea>
          <div style="display:flex;gap:6px;margin-top:4px;">
            <button class="btn btn-sm btn-primary" onclick="saveNote('${t.id}')">Save note</button>
            <button class="btn btn-sm" onclick="document.getElementById('note-edit-${t.id}').style.display='none'">Cancel</button>
          </div>
        </div>
      </div>
      <div class="task-actions">
        ${!minimal?`<button class="btn btn-icon btn-sm" title="Edit task" onclick="openEditTask('${t.id}')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 2l3 3-8 8H3v-3l8-8z"/></svg></button>`:''}
        <button class="btn btn-icon btn-sm btn-danger" title="Remove" onclick="deleteTask('${t.id}')"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/></svg></button>
      </div>
    </div>
  </div>`;
}

function qChangeStatus(id,val) { const t=db.tasks.find(t=>t.id===id);if(t){t.status=val;saveDB();renderCurrentPage();}}

function saveTaskModal() {
  const text=document.getElementById('tm-text').value.trim();

  const taskData = {
    text, assignee:document.getElementById('tm-assignee').value.trim(),

  };

function renderMeetingList(q) {

        </div>
        <div class="mtg-task-summary">${pendingLabel}</div>
        ${chevron}
      </div>
      <div class="meeting-card-body">
        ${m.summary?`<div class="meeting-summary">${m.summary}</div>`:''}
        ${kpsHtml}
        ${mt.length
          ? `<div class="section-head" style="margin-top:4px;">Tasks (${mt.length})</div><div class="task-list">${mt.map(t=>taskCardHtml(t,true)).join('')}</div>`
          : '<div style="font-size:13px;color:var(--text3);padding:4px 0;">No tasks recorded for this meeting.</div>'
        }
      </div>

  }).join('');

function onFileDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag'); const f=e.dataTransfer.files[0]; if(f) readFile(f); }
function handleFile(e) { const f=e.target.files[0]; if(f) readFile(f); }
function readFile(file) {
  const r=new FileReader();
  r.onload=ev=>{
    document.getElementById('imp-text').value=ev.target.result;
    document.getElementById('file-chip-area').innerHTML=`<span class="file-chip">📄 ${file.name}<button class="chip-remove" onclick="document.getElementById('file-chip-area').innerHTML='';document.getElementById('file-inp').value=''">×</button></span>`;
    if(!document.getElementById('imp-title').value) document.getElementById('imp-title').value=file.name.replace(/\.[^.]+$/,'');
  };
  r.readAsText(file);
}

async function runImport() {
  const raw=document.getElementById('imp-text').value.trim();
  if(!raw){alert('Please paste or upload meeting notes first.');return;}
  const btn=document.getElementById('imp-btn');btn.disabled=true;btn.textContent='Analysing…';
  const statusEl=document.getElementById('imp-status');
  statusEl.innerHTML=`<div class="ai-status-box"><div class="spinner"></div><span id="imp-msg">Claude is reading your notes…</span></div>`;
  const norm=normaliseText(raw);
  const dept=document.getElementById('imp-dept').value;
  const source=document.getElementById('imp-source').value;
  const prompt=`You are a meeting intelligence assistant for Malam Jabba Ski Resort (MJSR), Pakistan, operated by the Samsons Group. You process notes from MS Teams Read AI (structured: chapters, action items) or Samsung Notes voice summariser (free-form: agendas with bullet arrows).${dept?' Department context: '+dept+'.':''}

Return ONLY valid JSON with this exact structure (no markdown, no extra text):
{
  "summary": "2-4 sentence plain English summary of what was discussed and decided",
  "keyPoints": ["up to 5 key decisions or points"],
  "suggestedDept": "one of: Operations, Finance, HR, Sales, Marketing, Admin, Technical, Management, Other",
  "tasks": [
    {
      "text": "specific actionable task description",
      "assignee": "first name only, or empty string",
      "department": "one of: Operations, Finance, HR, Sales, Marketing, Admin, Technical, Management, Other",
      "due": "YYYY-MM-DD only if explicitly stated, else empty string",
      "priority": "high, medium, or low",
      "notes": "any important context or caveat for this task, or empty string"
    }
  ]
}

Extract EVERY action item. For Samsung Notes format look for bullet arrows (=>), agenda items, and implied actions. Assignee = first name only.

Meeting notes:
${norm}`;

  try {
    document.getElementById('imp-msg').textContent='Extracting tasks and summary…';
    let parsed;
    if (!SCRIPT_URL) throw new Error('No Apps Script URL set. Go to Settings and connect your Google Sheet first.');
    const resp=await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'aiAnalyse',prompt:prompt})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error);
    const text=data.result||'';
    parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    document.getElementById('imp-msg').textContent='Saving to database…';

    const title=document.getElementById('imp-title').value.trim()||(parsed.suggestedDept+' Meeting');
    const date=document.getElementById('imp-date').value||new Date().toISOString().slice(0,10);
    const finalDept=dept||parsed.suggestedDept||'Other';
    const mId='m'+Date.now();

    db.meetings.push({id:mId,title,date,source,dept:finalDept,summary:parsed.summary,rawText:raw,keyPoints:parsed.keyPoints||[]});
    const newTasks=[];
    (parsed.tasks||[]).forEach(t=>{
      const r=resolveAlias(t.assignee||'');
      newTasks.push({id:uid(),text:t.text,assignee:r.name,dept:t.department||finalDept,status:'pending',due:t.due||'',notes:t.notes||'',meetingId:mId,aliasResolved:r.resolved,aliasFrom:r.from,priority:t.priority||'medium'});
    });
    db.tasks.push(...newTasks);
    saveDB();
    statusEl.innerHTML='';
    const corrected=newTasks.filter(t=>t.aliasResolved);

    document.getElementById('imp-preview').innerHTML=`
      <div class="success-banner">${newTasks.length} tasks extracted and saved from: <strong>${title}</strong></div>
      ${corrected.length?`<div class="info-banner"><span>&#10003;</span><span>Name corrections applied: ${corrected.map(t=>`"${t.aliasFrom}" → ${t.assignee}`).join(' · ')}</span></div>`:''}
      ${parsed.keyPoints&&parsed.keyPoints.length?`<div class="import-kp-box"><div class="kp-label">Key points</div>${parsed.keyPoints.map(k=>`<div class="kp-item">— ${k}</div>`).join('')}</div>`:''}
      <div class="task-list">${newTasks.map(t=>`<div class="task-card ${pClass(t.priority||'medium')}"><div class="task-text">${t.text}</div><div class="task-meta">${t.assignee?`<span class="badge b-date">${t.assignee}</span>`:''} ${statusBadge('pending')} ${deptPill(t.dept)} ${t.notes?`<span class="badge b-date">${t.notes.slice(0,60)}…</span>`:''}</div></div>`).join('')}</div>
      <div style="margin-top:14px;display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="showPage('dashboard',null)">View dashboard</button>
        <button class="btn" onclick="showPage('meetings',null)">View meeting log</button>
      </div>`;
    btn.disabled=false;btn.textContent='Analyse with Claude AI';
  } catch(err) {

        </div>
      </div>
      <div class="report-section">
        <div class="report-section-title">Progress by department</div>
        ${Object.entries(dc).map(([d,s])=>`<div class="dept-progress-item"><span style="width:130px;flex-shrink:0;">${deptPill(d)}</span><div class="dept-bar-wrap"><div class="dept-bar-fill" style="width:${s.total?Math.round(s.complete/s.total*100):0}%"></div></div><span style="font-size:12px;color:var(--text3);width:90px;text-align:right;">${s.complete}/${s.total} done</span>${s.blocked?`<span class="badge b-blocked" style="margin-left:8px;">${s.blocked} blocked</span>`:''}</div>`).join('')}

function copyCEOText() {
  const tasks=db.tasks;
  const complete=tasks.filter(t=>t.status==='complete'),pending=tasks.filter(t=>t.status==='pending'||t.status==='wip'),blocked=tasks.filter(t=>t.status==='blocked');
  const lines=[
    `MJSR OPERATIONS UPDATE — ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`,``,
    `OVERVIEW`,`Total tasks tracked: ${tasks.length} (across ${db.meetings.length} meetings)`,`Completed: ${complete.length}`,`Pending / In progress: ${pending.length}`,`Blocked: ${blocked.length}`,``,
    `COMPLETED`,...(complete.length?complete.map(t=>`  [✓] ${t.text}${t.assignee?' ('+t.assignee+')':''}${t.dept?' ['+t.dept+']':''}`):['  None']),``,
    `PENDING / IN PROGRESS`,...(pending.length?pending.map(t=>`  [ ] ${t.text}${t.assignee?' ('+t.assignee+')':''}${t.dept?' ['+t.dept+']':''}${t.due?' — due '+fmtDate(t.due):''}`):['  None']),``,
    `BLOCKED — REQUIRES DECISION`,...(blocked.length?blocked.map(t=>`  [!] ${t.text}${t.assignee?' ('+t.assignee+')':''}${t.dept?' ['+t.dept+']':''}`):['  None'])
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const b=document.querySelector('.topbar-actions .btn-sm');if(b){b.textContent='Copied!';setTimeout(()=>b.textContent='Copy as text',2200);}
  });
}

/* ── ALIASES ── */
function renderAliases() {
  setTopbarActions('');
  document.getElementById('content-area').innerHTML=`
    <div style="max-width:700px;">
      <div class="info-banner"><span>&#9432;</span><span>When notes are imported, every detected name is checked against this table. Matches are silently corrected to the canonical name, and a "was …" badge appears on the task for traceability.</span></div>
      <div class="card" style="margin-bottom:20px;">
        <div class="card-header"><div class="card-title">Name alias table</div></div>
        <table class="alias-table" id="alias-tbl"><thead><tr><th>Correct name</th><th>AI may write it as</th><th></th></tr></thead><tbody id="alias-body"></tbody></table>
        <div style="padding:14px 16px;border-top:1px solid var(--border);">
          <div class="form-row">
            <div class="form-col"><label class="form-label">Correct name</label><input type="text" class="form-input" id="al-canon" placeholder="e.g. Momin"></div>
            <div class="form-col" style="flex:2;"><label class="form-label">Aliases (comma separated)</label><input type="text" class="form-input" id="al-variants" placeholder="e.g. Moorman, Moeman, Momeen"></div>
            <div style="align-self:flex-end;"><button class="btn btn-primary" onclick="addAlias()">Add</button></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Test the alias engine</div></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-col"><input type="text" class="form-input" id="al-test" placeholder="Type a name as the AI might mishear it…"></div>
            <div><button class="btn" onclick="testAlias()">Test</button></div>
          </div>
          <div id="al-result" style="margin-top:10px;"></div>
        </div>
      </div>
    </div>`;
  renderAliasRows();
}
function renderAliasRows() {
  const tbody=document.getElementById('alias-body');if(!tbody)return;
  tbody.innerHTML=db.aliases.length?db.aliases.map(e=>`<tr><td style="font-weight:500;">${e.canonical}</td><td>${e.variants.map(v=>`<span class="alias-tag">${v}</span>`).join('')}</td><td style="text-align:right;"><button class="btn btn-sm btn-danger" onclick="delAlias('${e.id}')">Remove</button></td></tr>`).join(''):`<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:20px;">No aliases yet.</td></tr>`;
}
function addAlias() {
  const c=document.getElementById('al-canon').value.trim(),v=document.getElementById('al-variants').value.trim();
  if(!c||!v){alert('Please fill in both fields.');return;}
  const variants=v.split(',').map(x=>x.trim()).filter(Boolean);
  const ex=db.aliases.find(a=>a.canonical.toLowerCase()===c.toLowerCase());
  if(ex)ex.variants=[...new Set([...ex.variants,...variants])];
  else db.aliases.push({id:'a'+Date.now(),canonical:c,variants});
  document.getElementById('al-canon').value='';document.getElementById('al-variants').value='';
  saveDB();renderAliasRows();
}
function delAlias(id){db.aliases=db.aliases.filter(a=>a.id!==id);saveDB();renderAliasRows();}
function testAlias(){
  const raw=document.getElementById('al-test').value.trim();
  const res=resolveAlias(raw);
  const el=document.getElementById('al-result');if(!raw){el.innerHTML='';return;}
  el.innerHTML=res.resolved?`<div class="success-banner">"${raw}" → will be corrected to <strong>${res.name}</strong></div>`:`<div class="info-banner"><span>—</span><span>"${raw}" has no alias match and will be saved as-is.</span></div>`;
}

function exportData() {
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`MJSR_Hub_Backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importBackup(e) {
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{try{db=JSON.parse(ev.target.result);saveDB();alert('Backup restored successfully.');showPage('dashboard',null);}catch(err){alert('Invalid backup file.');}};r.readAsText(f);
}

/* ── INIT ── */
function doForceSync() {
  const btn = document.getElementById('force-sync-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  pushToSheets(null, {action:'syncAll', data:db}).then(() => {
    if (btn) { btn.disabled = false; btn.textContent = 'Force full sync'; }
    alert('Full sync complete.');
  });
}

async function refreshFromSheets() {
  if (!SCRIPT_URL) { alert('No Sheets connection. Go to Settings and connect first.'); return; }
  setSyncStatus('syncing', 'Pulling latest from Sheets…');
  try {
    const resp = await fetch(SCRIPT_URL + '?action=getAll', { method: 'GET' });
    const result = await resp.json();
    if (result.meetings && result.tasks && result.aliases) {
      db.meetings = result.meetings;
      db.tasks    = result.tasks;
      db.aliases  = result.aliases;
      localStorage.setItem('mjsr_hub_db', JSON.stringify(db));
      setSyncStatus('synced');
      renderCurrentPage();
      updateNavBadge();
      alert('Dashboard refreshed — ' + db.tasks.length + ' tasks loaded from Sheets.');
    }
  } catch(err) {
    setSyncStatus('error', 'Refresh failed');
    alert('Could not reach Sheets. Check your connection.');
  }
}

loadDB();
DEPTS.forEach(d=>{ try{document.getElementById('tm-dept').innerHTML+='<option>'+d+'</option>';}catch(e){} });
renderDashboard();
